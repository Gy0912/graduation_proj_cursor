# 与 configs/default.yaml 合并使用：python training/dpo_train.py --config configs/dpo.yaml
# 覆盖 DPO 显存与数据路径相关项

paths:
  dpo_lora_dir: outputs/models/lora_dpo_starcoder2_3b

files:
  dpo_pairs: data/dpo_pairs.json

training:
  # 2026-05-09: 降低 LR 防止过拟合 SFT 模型 DPO 崩溃（不覆盖 default.yaml）
  # learning_rate_dpo 继承自 default.yaml (2.0e-7)
  num_train_epochs_dpo: 1
  grad_accum: 8
  save_steps: 200

dpo:
  # 2026-05-09: beta 保持 0.5（与 default.yaml 一致）——防止DPO分布崩溃
  beta: 0.5
  max_length: 1024
